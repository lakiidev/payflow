spring:
  datasource:
    write:
      url: jdbc:postgresql://postgres-primary:5432/payflow
      username: ${DB_USER}
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
    read:
      url: jdbc:postgresql://postgres-replica:5432/payflow
      username: ${DB_USER}
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: redis
      port: 6379
      timeout: 2000ms
  kafka:
    bootstrap-servers: kafka:9092

logging:
  level:
    com.payflow: INFO