spring:
  datasource:
      url: jdbc:postgresql://postgres:5432/payflow
      username: ${DB_USER}
      password: ${DB_PASSWORD}
      driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: redis
      port: 6379
  kafka:
    bootstrap-servers: kafka:9092  # internal listener

logging:
  level:
    com.payflow: INFO