spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/payflow
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
logging:
  level:
    com.payflow: DEBUG
    org.hibernate.SQL: DEBUG